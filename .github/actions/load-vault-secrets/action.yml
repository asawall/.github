name: Load Vault Secrets
description: LĂ¤dt Secrets aus Infisical Vault als GITHUB_ENV-Variablen. Caller muss VAULT_CLIENT_ID und VAULT_CLIENT_SECRET im env-Block des Step setzen.

inputs:
  project-slug:
    description: Vault-Projekt-Slug
    required: true
  env-slug:
    description: Environment-Slug
    required: false
    default: prod
  path:
    description: Folder-Pfad
    required: false
    default: /
  keys:
    description: Komma-getrennte Liste von Secret-SchlĂĽsseln
    required: true
  vault-url:
    description: Vault-Endpoint
    required: false
    default: https://vault.tecmatiq.de

runs:
  using: composite
  steps:
    - name: Authenticate against Vault
      shell: bash
      env:
        VAULT_URL: ${{ inputs.vault-url }}
      run: |
        set -euo pipefail
        if [ -z "${VAULT_CLIENT_ID:-}" ] || [ -z "${VAULT_CLIENT_SECRET:-}" ]; then
          echo "::error::VAULT_CLIENT_ID / VAULT_CLIENT_SECRET nicht im env-Block des aufrufenden Steps gesetzt"
          exit 1
        fi
        TOKEN=$(curl -sS -X POST "$VAULT_URL/api/v1/auth/universal-auth/login" \
          -H "Content-Type: application/json" \
          -d "{\"clientId\":\"$VAULT_CLIENT_ID\",\"clientSecret\":\"$VAULT_CLIENT_SECRET\"}" \
          | jq -r '.accessToken // empty')
        if [ -z "$TOKEN" ]; then
          echo "::error::Vault-Login fehlgeschlagen"
          exit 1
        fi
        echo "VAULT_TOKEN=$TOKEN" >> "$GITHUB_ENV"
        echo "VAULT_URL_RESOLVED=$VAULT_URL" >> "$GITHUB_ENV"
        echo "::add-mask::$TOKEN"
    - name: Fetch Secrets
      shell: bash
      env:
        PROJECT_SLUG: ${{ inputs.project-slug }}
        ENV_SLUG: ${{ inputs.env-slug }}
        SECRET_PATH: ${{ inputs.path }}
        KEYS: ${{ inputs.keys }}
      run: |
        set -euo pipefail
        RESP=$(curl -sS -G "$VAULT_URL_RESOLVED/api/v3/secrets/raw" \
          -H "Authorization: Bearer $VAULT_TOKEN" \
          --data-urlencode "workspaceSlug=$PROJECT_SLUG" \
          --data-urlencode "environment=$ENV_SLUG" \
          --data-urlencode "secretPath=$SECRET_PATH")
        IFS=',' read -ra REQUESTED <<< "$KEYS"
        for K in "${REQUESTED[@]}"; do
          K="${K// /}"
          V=$(echo "$RESP" | jq -r --arg k "$K" '.secrets[] | select(.secretKey == $k) | .secretValue')
          if [ -z "$V" ]; then
            echo "::error::Secret $K nicht gefunden in $PROJECT_SLUG/$ENV_SLUG$SECRET_PATH"
            exit 1
          fi
          echo "::add-mask::$V"
          echo "${K}=${V}" >> "$GITHUB_ENV"
          echo "  + ${K} loaded"
        done
