name: Setup Android SDK
description: "Java + Android SDK + ANDROID_HOME + sdk.dir"
inputs:
  java-version:
    required: false
    default: "17"
  android-platform:
    required: false
    default: "34"
  build-tools:
    required: false
    default: "34.0.0"
  cmdline-tools-version:
    required: false
    default: "11076708"
  project-dir:
    required: false
    default: "."
runs:
  using: composite
  steps:
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: gradle
    - uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: ${{ inputs.cmdline-tools-version }}
        packages: "platforms;android-${{ inputs.android-platform }} build-tools;${{ inputs.build-tools }} platform-tools"
    - shell: bash
      run: |
        set -e
        echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
        if [ -d "${{ inputs.project-dir }}" ]; then
          echo "sdk.dir=$ANDROID_HOME" > "${{ inputs.project-dir }}/local.properties"
        fi
