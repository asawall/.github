name: Diag - Mac/Mail/File-Classifier Pipeline

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: [self-hosted, linux, kingdom-ai]
    timeout-minutes: 10
    steps:
      - name: Run KAI diagnostics
        run: |
          if [ ! -f /home/runner/.ssh/deploy_ed25519 ]; then
            echo "::error::deploy key not mounted"; exit 1
          fi
          chmod 600 /home/runner/.ssh/deploy_ed25519
          mkdir -p /home/runner/.ssh
          ssh-keyscan -H 46.224.164.200 >> /home/runner/.ssh/known_hosts 2>/dev/null

          ssh -i /home/runner/.ssh/deploy_ed25519 \
              -o BatchMode=yes -o ConnectTimeout=15 \
              root@46.224.164.200 'bash -s' <<'REMOTE'
          set +e
          echo "============================================"
          echo "=== 1. Mail-Archiver V2: services + logs ==="
          echo "============================================"
          for svc in mail-archiver mail-archiver-v2 tecmatiq-filter mailarchiver; do
            if systemctl list-unit-files | grep -q "^${svc}"; then
              echo "--- ${svc} ---"
              systemctl status ${svc}* --no-pager 2>&1 | head -25
              echo
            fi
          done

          echo "--- /opt/tecmatiq-filter contents ---"
          ls -la /opt/tecmatiq-filter/ 2>&1 | head -20
          ls -la /mail-archiver/ 2>&1 | head -20

          echo
          echo "--- recent journal entries for mail-archiver* ---"
          journalctl -u 'mail-archiver*' -u 'tecmatiq-filter*' --since "today" --no-pager 2>&1 | tail -50

          echo
          echo "============================================"
          echo "=== 2. file-classifier service ==="
          echo "============================================"
          systemctl list-units --all | grep -iE 'classifier|file-class' | head -10
          docker ps -a --format 'table {{.Names}}	{{.Status}}	{{.Ports}}' 2>&1 | grep -iE 'classif|nextcloud|ai-stack' | head -20

          echo
          echo "--- file-classifier docker logs (last 30) ---"
          for c in $(docker ps -a --format '{{.Names}}' | grep -iE 'classif'); do
            echo "### container: $c ###"
            docker logs --tail 30 "$c" 2>&1
          done

          echo
          echo "============================================"
          echo "=== 3. Nextcloud /Rechnungen/Tecmatiq/2026/ ==="
          echo "============================================"
          NC_DATA="/srv/nextcloud-archive/data"
          for u in andreas a.sawall andreas.sawall; do
            P="$NC_DATA/$u/files/Rechnungen/Tecmatiq/2026"
            if [ -d "$P" ]; then
              echo "Found user: $u"
              echo "Listing $P (sorted by mtime, newest first):"
              ls -lat "$P" 2>&1 | head -20
              echo
              echo "Today's files in /Rechnungen/Tecmatiq/ tree:"
              find "$NC_DATA/$u/files/Rechnungen/Tecmatiq" -type f -newermt "$(date +%Y-%m-%d)" 2>&1 | head -30
              break
            fi
          done

          echo
          echo "============================================"
          echo "=== 4. ai-stack containers ==="
          echo "============================================"
          docker ps --format 'table {{.Names}}	{{.Status}}	{{.Ports}}' 2>&1 | head -30
          
          echo
          echo "============================================"
          echo "=== 5. file-classifier endpoints via nginx ==="
          echo "============================================"
          ls /etc/nginx/sites-enabled/ 2>&1
          grep -l 'file-classifier\|file_classifier' /etc/nginx/sites-enabled/* 2>&1 || echo "no nginx config mentions file-classifier"
          grep -rA 2 'file-classifier' /etc/nginx/sites-enabled/ 2>&1 | head -30

          echo
          echo "============================================"
          echo "=== 6. Mail accounts / IMAP polling logs ==="
          echo "============================================"
          find /var/log -name '*mail*' -mmin -1440 -type f 2>/dev/null | head -5
          journalctl --since "today" --no-pager 2>&1 | grep -iE 'imap|mailbox|invoice|rechnung|HDS' | tail -20

          echo
          echo "============================================"
          echo "=== 7. WebDAV upload endpoint to Nextcloud ==="
          echo "============================================"
          # Check if there is a watcher service for /Rechnungen
          systemctl list-units --all | grep -iE 'sync|watch|inotify|rechnung' | head -10

          REMOTE
