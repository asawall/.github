name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
        description: 'GHCR image name (e.g. kingdom-ai/backend)'
      context:
        required: false
        type: string
        default: '.'
      dockerfile:
        required: false
        type: string
        default: 'Dockerfile'
      runner-label:
        required: true
        type: string
        description: 'Self-hosted runner label (e.g. kingdom-ai)'
      build-args:
        required: false
        type: string
        default: ''
      platforms:
        required: false
        type: string
        default: 'linux/amd64'
    outputs:
      image-tag:
        description: 'Full image tag with SHA'
        value: ${{ jobs.build.outputs.image-tag }}

jobs:
  build:
    runs-on: [self-hosted, linux, "${{ inputs.runner-label }}"]
    timeout-minutes: 30
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/asawall/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: true
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/asawall/${{ inputs.image-name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/asawall/${{ inputs.image-name }}:buildcache,mode=max,ignore-error=true
