# Reusable Workflow: actionlint + shellcheck (Severity ≥ warning)
# Style/info-level Findings sind nicht-blocking (würden bei strikt-Mode 80% der Workflows rot färben).
# Aufruf: uses: asawall/.github/.github/workflows/lint.yml@main
#
# Runner: läuft auf den ephemeren self-hosted Runnern (Label [self-hosted, linux]).
# Tools werden über mehrere Fallback-Pfade bereitgestellt: vorinstalliert → apt → python (shellcheck-py) → static binary.
name: Lint

on:
  workflow_call:
    inputs:
      runner-label:
        description: "Zusätzliches Runner-Label (z.B. 'kingdom-ai'). Leer = beliebiger self-hosted-linux."
        required: false
        type: string
        default: ""
      shell-script-paths:
        required: false
        type: string
        default: "scripts/*.sh scripts/**/*.sh deploy/*.sh deploy/**/*.sh .github/scripts/*.sh"
      shellcheck-severity:
        description: "Severity threshold (style|info|warning|error). Default: warning"
        required: false
        type: string
        default: "warning"

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint (static binary)
        shell: bash
        run: |
          set -euo pipefail
          if command -v actionlint >/dev/null 2>&1; then
            echo "actionlint already installed: $(actionlint -version | head -1)"
            exit 0
          fi
          ACTIONLINT_VERSION="1.7.7"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          TMPDIR=$(mktemp -d)
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_${ARCH}.tar.gz" \
            | tar -xz -C "$TMPDIR" actionlint
          install -m 0755 "$TMPDIR/actionlint" "$RUNNER_TEMP/actionlint"
          rm -rf "$TMPDIR"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/actionlint" -version

      - name: Install shellcheck (Multi-Fallback)
        shell: bash
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck already installed: $(shellcheck --version | grep ^version || true)"
            exit 0
          fi

          # Fallback 1: apt-get (Debian/Ubuntu, läuft als root oder mit sudo)
          if command -v apt-get >/dev/null 2>&1; then
            echo "Trying apt-get install shellcheck..."
            if [ "$(id -u)" = "0" ]; then
              SUDO=""
            else
              SUDO="sudo"
            fi
            if $SUDO apt-get update -qq >/dev/null 2>&1 && \
               $SUDO apt-get install -y -qq shellcheck >/dev/null 2>&1; then
              echo "shellcheck installed via apt-get: $(shellcheck --version | grep ^version || true)"
              exit 0
            fi
            echo "apt-get install failed, trying next fallback..."
          fi

          # Fallback 2: apk (Alpine)
          if command -v apk >/dev/null 2>&1; then
            echo "Trying apk add shellcheck..."
            if apk add --no-cache shellcheck >/dev/null 2>&1; then
              echo "shellcheck installed via apk"
              exit 0
            fi
          fi

          # Fallback 3: shellcheck-py (Python wrapper, bundles static binary)
          # Python kann xz/lzma intern (lzma module, kein system-xz nötig)
          if command -v python3 >/dev/null 2>&1; then
            echo "Trying pip install shellcheck-py..."
            if python3 -m pip install --user --quiet shellcheck-py 2>/dev/null; then
              PIP_BIN="$(python3 -m site --user-base)/bin"
              if [ -x "$PIP_BIN/shellcheck" ]; then
                cp "$PIP_BIN/shellcheck" "$RUNNER_TEMP/shellcheck"
                chmod +x "$RUNNER_TEMP/shellcheck"
                echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
                "$RUNNER_TEMP/shellcheck" --version
                exit 0
              fi
            fi
            echo "shellcheck-py install failed, trying next fallback..."
          fi

          # Fallback 4: static binary via xz (falls xz vorhanden)
          if command -v xz >/dev/null 2>&1; then
            echo "Trying static binary download (tar.xz)..."
            SHELLCHECK_VERSION="0.10.0"
            ARCH=$(uname -m)
            TMPDIR=$(mktemp -d)
            curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.${ARCH}.tar.xz" \
              | tar -xJ -C "$TMPDIR"
            install -m 0755 "$TMPDIR/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "$RUNNER_TEMP/shellcheck"
            rm -rf "$TMPDIR"
            echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
            "$RUNNER_TEMP/shellcheck" --version
            exit 0
          fi

          echo "::error::All shellcheck install fallbacks failed (no apt, no apk, no python3+pip, no xz)" >&2
          exit 1

      - name: Run actionlint (with shellcheck severity ${{ inputs.shellcheck-severity }})
        shell: bash
        run: |
          actionlint -color -shellcheck "$(command -v shellcheck) -S ${{ inputs.shellcheck-severity }}"

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (Multi-Fallback)
        shell: bash
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck already installed: $(shellcheck --version | grep ^version || true)"
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            echo "Trying apt-get install shellcheck..."
            if [ "$(id -u)" = "0" ]; then SUDO=""; else SUDO="sudo"; fi
            if $SUDO apt-get update -qq >/dev/null 2>&1 && \
               $SUDO apt-get install -y -qq shellcheck >/dev/null 2>&1; then
              echo "shellcheck installed via apt-get"
              exit 0
            fi
            echo "apt-get install failed, trying next fallback..."
          fi

          if command -v apk >/dev/null 2>&1; then
            if apk add --no-cache shellcheck >/dev/null 2>&1; then
              echo "shellcheck installed via apk"
              exit 0
            fi
          fi

          if command -v python3 >/dev/null 2>&1; then
            echo "Trying pip install shellcheck-py..."
            if python3 -m pip install --user --quiet shellcheck-py 2>/dev/null; then
              PIP_BIN="$(python3 -m site --user-base)/bin"
              if [ -x "$PIP_BIN/shellcheck" ]; then
                cp "$PIP_BIN/shellcheck" "$RUNNER_TEMP/shellcheck"
                chmod +x "$RUNNER_TEMP/shellcheck"
                echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
                "$RUNNER_TEMP/shellcheck" --version
                exit 0
              fi
            fi
          fi

          if command -v xz >/dev/null 2>&1; then
            SHELLCHECK_VERSION="0.10.0"
            ARCH=$(uname -m)
            TMPDIR=$(mktemp -d)
            curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.${ARCH}.tar.xz" \
              | tar -xJ -C "$TMPDIR"
            install -m 0755 "$TMPDIR/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "$RUNNER_TEMP/shellcheck"
            rm -rf "$TMPDIR"
            echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
            "$RUNNER_TEMP/shellcheck" --version
            exit 0
          fi

          echo "::error::All shellcheck install fallbacks failed" >&2
          exit 1

      - name: Find and check shell scripts
        shell: bash
        env:
          SEVERITY: ${{ inputs.shellcheck-severity }}
        run: |
          set -e
          FOUND=0
          EXIT=0
          for pattern in ${{ inputs.shell-script-paths }}; do
            for f in $pattern; do
              if [ -f "$f" ]; then
                FOUND=$((FOUND+1))
                echo "::group::shellcheck $f"
                shellcheck -x -S "$SEVERITY" -e SC2034,SC2154 "$f" || EXIT=$?
                echo "::endgroup::"
              fi
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "::notice::Keine Shell-Scripts gefunden"
          else
            echo "Geprüft: $FOUND Script(s) (Severity ≥ $SEVERITY)"
          fi
          exit $EXIT
