# Reusable Workflow: actionlint + shellcheck (Severity ≥ warning)
# Style/info-level Findings sind nicht-blocking (würden bei strikt-Mode 80% der Workflows rot färben).
# Aufruf: uses: asawall/.github/.github/workflows/lint.yml@main
#
# Runner: läuft auf den ephemeren self-hosted Runnern (Label [self-hosted, linux]).
# Tools werden bei jedem Lauf als statische Binaries nachgeladen — keine Abhängigkeit
# von apt/sudo oder Docker-in-Docker im Container.
name: Lint

on:
  workflow_call:
    inputs:
      runner-label:
        description: "Zusätzliches Runner-Label (z.B. 'kingdom-ai'). Leer = beliebiger self-hosted-linux."
        required: false
        type: string
        default: ""
      shell-script-paths:
        required: false
        type: string
        default: "scripts/*.sh scripts/**/*.sh deploy/*.sh deploy/**/*.sh .github/scripts/*.sh"
      shellcheck-severity:
        description: "Severity threshold (style|info|warning|error). Default: warning"
        required: false
        type: string
        default: "warning"

jobs:
  actionlint:
    runs-on: ${{ inputs.runner-label == '' && fromJSON('["self-hosted","linux"]') || fromJSON(format('["self-hosted","linux","{0}"]', inputs.runner-label)) }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint (static binary)
        run: |
          set -e
          ACTIONLINT_VERSION="1.7.7"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          TMPDIR=$(mktemp -d)
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_${ARCH}.tar.gz" \
            | tar -xz -C "$TMPDIR" actionlint
          install -m 0755 "$TMPDIR/actionlint" "$RUNNER_TEMP/actionlint"
          rm -rf "$TMPDIR"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/actionlint" -version

      - name: Install shellcheck (static binary, für Inline-Check durch actionlint)
        run: |
          set -e
          SHELLCHECK_VERSION="0.10.0"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH=x86_64 ;;
            aarch64) ARCH=aarch64 ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          TMPDIR=$(mktemp -d)
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.${ARCH}.tar.xz" \
            | tar -xJ -C "$TMPDIR"
          install -m 0755 "$TMPDIR/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "$RUNNER_TEMP/shellcheck"
          rm -rf "$TMPDIR"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/shellcheck" --version

      - name: Run actionlint (with shellcheck severity ${{ inputs.shellcheck-severity }})
        run: |
          actionlint -color -shellcheck "$(command -v shellcheck) -S ${{ inputs.shellcheck-severity }}"

  shellcheck:
    runs-on: ${{ inputs.runner-label == '' && fromJSON('["self-hosted","linux"]') || fromJSON(format('["self-hosted","linux","{0}"]', inputs.runner-label)) }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (static binary)
        run: |
          set -e
          SHELLCHECK_VERSION="0.10.0"
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH=x86_64 ;;
            aarch64) ARCH=aarch64 ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          TMPDIR=$(mktemp -d)
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.${ARCH}.tar.xz" \
            | tar -xJ -C "$TMPDIR"
          install -m 0755 "$TMPDIR/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" "$RUNNER_TEMP/shellcheck"
          rm -rf "$TMPDIR"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          shellcheck --version

      - name: Find and check shell scripts
        env:
          SEVERITY: ${{ inputs.shellcheck-severity }}
        run: |
          set -e
          FOUND=0
          EXIT=0
          for pattern in ${{ inputs.shell-script-paths }}; do
            for f in $pattern; do
              if [ -f "$f" ]; then
                FOUND=$((FOUND+1))
                echo "::group::shellcheck $f"
                shellcheck -x -S "$SEVERITY" -e SC2034,SC2154 "$f" || EXIT=$?
                echo "::endgroup::"
              fi
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "::notice::Keine Shell-Scripts gefunden"
          else
            echo "Geprüft: $FOUND Script(s) (Severity ≥ $SEVERITY)"
          fi
          exit $EXIT
